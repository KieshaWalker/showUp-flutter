name: Deploy Web

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Create env.dart from secrets
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
        run: |
          URL=$(echo -n "${SUPABASE_URL}" | tr -d '[:space:]')
          KEY=$(echo -n "${SUPABASE_ANON_KEY}" | tr -d '[:space:]')
          printf "const supabaseUrl = '%s';\nconst supabaseAnonKey = '%s';\n" "${URL}" "${KEY}" > lib/src/core/env.dart

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.2'
          channel: stable

      - run: flutter pub get

      - run: flutter build web --release

      - name: Stage vercel config and drift web assets
        run: |
          cp vercel.json build/web/vercel.json
          mkdir -p build/web/.vercel
          echo '{"projectId":"${{ secrets.VERCEL_PROJECT_ID }}","orgId":"${{ secrets.VERCEL_ORG_ID }}"}' > build/web/.vercel/project.json

      - name: Deploy to Vercel
        run: |
          npm install -g vercel@latest
          vercel deploy ./build/web --prod --yes --token=${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
